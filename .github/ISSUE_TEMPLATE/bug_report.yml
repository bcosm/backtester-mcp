name: Bug report
description: Something broke or behaves unexpectedly
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you run, and what went wrong?
      placeholder: |
        I ran `backtester-mcp backtest -s strategies/momentum.py -d datasets/spy_daily.parquet --robustness`
        and it crashed with...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest script or command that reproduces it. Include data shape if relevant.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: backtester-mcp version
      description: Output of `pip show backtester-mcp | grep Version`
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.7"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Traceback or logs
      render: shell
